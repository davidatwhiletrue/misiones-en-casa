services:
  db:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-misiones}
      MYSQL_USER: ${MYSQL_USER:-misiones}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-misiones}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3030:3030"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-misiones}:${MYSQL_PASSWORD:-misiones}@db:3306/${MYSQL_DATABASE:-misiones}
    restart: unless-stopped

volumes:
  mysql-data:
